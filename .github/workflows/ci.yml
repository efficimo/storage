name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck core
        run: npm -w core run typecheck

      - name: Test core
        run: npm -w core run test

      - name: Build core
        run: npm -w core run build

      - name: Typecheck react
        run: npm -w react run typecheck
